# ==========================================
# StockPilot - Personal Investment Profile Config
# ==========================================
# Design Philosophy:
# - Algorithmic rigor belongs to scripts: MA, MACD, divergence, support levels
# - Fuzzy reasoning belongs to AI: portfolio context, news sentiment, market trends
# - Scripts handle certainty (calculation, statistics, feature extraction)
# - AI handles uncertainty (strategy combination, position sizing, style matching)
#
# This config file defines:
# 1. User profiles with investment style and risk preferences
# 2. Security pool with positions, tags, and strategy notes
# 3. Data fetch preferences for technical indicators
# 4. AI response preferences for personalized advice
# ==========================================

# ==========================================
# 1. Global Settings
# ==========================================
global_config:
  version: "1.0.0"
  akshare_retry_count: 3
  market_monitor:
    indices:
      - code: "000001.SH"
        name: "上证指数"
        enabled: true
      - code: "000300.SH"
        name: "沪深300"
        enabled: true
      - code: "399006.SZ"
        name: "创业板指"
        enabled: true
      - code: "399001.SZ"
        name: "深证成指"
        enabled: true

# ==========================================
# 2. User Profiles
# ==========================================
profiles:
  - profile_id: "default"
    profile_name: "Default User"
    is_active: true

    investment_style:
      - content: "Focus on medium to long-term returns and industry leaders"
        enabled: true
      - content: "Accept short-term quick trades in hot sectors"
        enabled: true
      - content: "Strict stop-loss at 8%"
        enabled: true

    current_macro_context:
      - date: ""
        summary: ""

    assets:
      total_capital: 230000.0
      available_cash: 15000.0
      include_cash_in_prompt: true

    data_fetch_config:
      fetch_full_realtime: false
      fetch_main_money_flow: true
      fetch_valuation_metrics: true
      fetch_announcements: true
      fetch_news_sentiment: true
      consult_scope:
        - "当前持仓"
        - "重点观察"

    response_preference:
      - content: "Only list securities that require action, skip hold/observe positions"
        enabled: true
      - content: "Pay close attention to KDJ indicators for buy signals"
        enabled: true
      - content: "Provide specific operation suggestions with approximate amounts or ratios based on current market time"
        enabled: true

